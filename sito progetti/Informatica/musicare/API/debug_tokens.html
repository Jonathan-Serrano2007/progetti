<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Tokens</title>
    <style>
        body { font-family: monospace; background: #222; color: #0f0; padding: 20px; }
        .section { margin-bottom: 30px; padding: 15px; border: 1px solid #0f0; border-radius: 5px; }
        input { width: 100%; padding: 8px; margin: 5px 0; bg-color: #333; color: #0f0; }
        button { padding: 10px 20px; margin: 5px 0; background: #0f0; color: #000; cursor: pointer; font-weight: bold; }
        .response { background: #111; padding: 10px; margin-top: 10px; border-left: 3px solid #0f0; max-height: 300px; overflow-y: auto; }
        .error { color: #f00; }
        .success { color: #0f0; }
        textarea { width: 100%; height: 100px; padding: 10px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>🔐 Debug JWT Tokens</h1>

    <div class="section">
        <h2>1️⃣ Login</h2>
        <p>Email:</p>
        <input type="email" id="email" placeholder="example@test.com">
        <p>Password:</p>
        <input type="password" id="password" placeholder="password">
        <button onclick="doLogin()">Fai Login</button>
        <div id="loginResponse" class="response"></div>
    </div>

    <div class="section">
        <h2>2️⃣ Token Ricevuti</h2>
        <p><strong>Access Token:</strong></p>
        <textarea id="accessToken" readonly></textarea>
        
        <p><strong>Refresh Token:</strong></p>
        <textarea id="refreshToken" readonly></textarea>
    </div>

    <div class="section">
        <h2>3️⃣ Fai Refresh</h2>
        <button onclick="doRefresh()">Refresh Token</button>
        <div id="refreshResponse" class="response"></div>
    </div>

    <div class="section">
        <h2>4️⃣ Verifica Permessi con Access Token</h2>
        <button onclick="doPermissions()">Verifica Permessi</button>
        <div id="permissionsResponse" class="response"></div>
    </div>

    <script>
        const API_BASE = window.location.origin + window.location.pathname.split('/API')[0] + '/API';

        async function doLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const responseDiv = document.getElementById('loginResponse');

            try {
                const response = await fetch(`${API_BASE}/auth_api.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                
                if (response.ok && data.access_token && data.refresh_token) {
                    document.getElementById('accessToken').value = data.access_token;
                    document.getElementById('refreshToken').value = data.refresh_token;
                    
                    responseDiv.innerHTML = `<span class="success">✅ Login riuscito!</span><br><br>`;
                    responseDiv.innerHTML += `<b>Utente ID:</b> ${data.user.id_utente}<br>`;
                    responseDiv.innerHTML += `<b>Nome:</b> ${data.user.nome}<br>`;
                    responseDiv.innerHTML += `<b>Email:</b> ${data.user.email}<br>`;
                    responseDiv.innerHTML += `<b>Access token expire:</b> ${data.expires_in}s<br>`;
                    responseDiv.innerHTML += `<b>Refresh token expire:</b> ${data.refresh_expires_in}s<br>`;
                } else {
                    responseDiv.innerHTML = `<span class="error">❌ Errore: ${data.error}</span>`;
                }
            } catch (error) {
                responseDiv.innerHTML = `<span class="error">❌ Errore di rete: ${error.message}</span>`;
            }
        }

        async function doRefresh() {
            const refreshToken = document.getElementById('refreshToken').value;
            const responseDiv = document.getElementById('refreshResponse');

            if (!refreshToken) {
                responseDiv.innerHTML = `<span class="error">❌ Refresh token mancante! Fai prima il login.</span>`;
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/refresh_api.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ refresh_token: refreshToken })
                });

                const data = await response.json();
                
                if (response.ok && data.access_token) {
                    document.getElementById('accessToken').value = data.access_token;
                    document.getElementById('refreshToken').value = data.refresh_token;
                    
                    responseDiv.innerHTML = `<span class="success">✅ Refresh riuscito!</span><br><br>`;
                    responseDiv.innerHTML += `<b>Nuovo Access Token</b> salvato<br>`;
                    responseDiv.innerHTML += `<b>Nuovo Refresh Token</b> salvato<br>`;
                } else {
                    responseDiv.innerHTML = `<span class="error">❌ Errore ${response.status}: ${data.error}</span>`;
                }
            } catch (error) {
                responseDiv.innerHTML = `<span class="error">❌ Errore di rete: ${error.message}</span>`;
            }
        }

        async function doPermissions() {
            const accessToken = document.getElementById('accessToken').value;
            const responseDiv = document.getElementById('permissionsResponse');

            if (!accessToken) {
                responseDiv.innerHTML = `<span class="error">❌ Access token mancante! Fai prima il login o refresh.</span>`;
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/permissions_api.php`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({})
                });

                const data = await response.json();
                
                if (response.ok) {
                    responseDiv.innerHTML = `<span class="success">✅ Permessi recuperati!</span><br><br>`;
                    responseDiv.innerHTML += `<pre>${JSON.stringify(data, null, 2)}</pre>`;
                } else {
                    responseDiv.innerHTML = `<span class="error">❌ Errore ${response.status}: ${data.error}</span>`;
                }
            } catch (error) {
                responseDiv.innerHTML = `<span class="error">❌ Errore di rete: ${error.message}</span>`;
            }
        }

        // Pre-fill con dati comuni per test
        document.getElementById('email').value = 'admin@test.com';
        document.getElementById('password').value = 'password';
    </script>
</body>
</html>
